kind = "web"
previewPath = "/"
title = "Manisha Shrestha — Official Website"
version = "1.0.0"
id = "artifacts/manisha-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20926
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/manisha-website run dev"

[services.env]
PORT = "20926"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/manisha-website", "run", "build"]
publicDir = "artifacts/manisha-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
